{% extends 'base.html' %}
{% load static %}
{% block content %}
<link rel="stylesheet" href="{% static 'css/addmember.css' %}">

<body style="background-image: url('{% static "image/img_1.png" %}');">

<div class="container">
    <h2>User Details Form</h2>

    <form action="{% url 'addmember' %}" method="post">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>
        {% csrf_token %}

        <label for="age">Age</label>
        <input type="number" id="age" name="age" placeholder="Enter your age" required>

        <label for="income">Income</label>
        <input type="number" id="income" name="income" placeholder="Enter your income" required>

        <button type="submit">Submit</button>
    </form>
</div>
{% endblock %}
